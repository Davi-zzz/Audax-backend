version: '3.8'

# Dual-mode Docker Compose:
# - MODE=cache: backend uses InMemoryRepository (no Postgres)
# - MODE=integration: backend uses PrismaRepository (with Postgres)
#
# Usage:
#   MODE=cache docker-compose up
#   MODE=integration docker-compose up

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_tech_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - integration

volumes:
  postgres_data:
