version: '3.8'

# Dual-mode Docker Compose:
# - MODE=cache: InMemoryRepository, no Postgres
# - MODE=integration: PrismaRepository with Postgres
#
# Usage:
#   MODE=cache docker-compose up
#   MODE=integration docker-compose up

services:
  # Postgres (only in integration mode)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_tech_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
  # Backend (NestJS)
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - '3001:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      REPOSITORY_TYPE: ${MODE:-cache}
      DATABASE_URL: ${MODE:+postgresql://postgres:postgres@postgres:5432/test_tech_db}
    networks:
      - app

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://backend:3000
    depends_on:
      - backend
    networks:
      - app

volumes:
  postgres_data:

networks:
  app:
    driver: bridge
